services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.pi
    container_name: llamativo-admin-backend
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - PORT=8080
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - ENV=${ENV}
      - SII_RUT=${SII_RUT}
      - SII_PASSWORD=${SII_PASSWORD}
      - ML_CLIENT_ID=${ML_CLIENT_ID}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET}
      - WOO_BASE_URL=${WOO_BASE_URL}
      - WOO_CONSUMER_KEY=${WOO_CONSUMER_KEY}
      - WOO_CONSUMER_SECRET=${WOO_CONSUMER_SECRET}
    shm_size: '2gb'
